<!DOCTYPE html>
<html lang = "vi">
    <head>
	    <title>Thiết kế from đăng nhập </title>
		<meta charset = "utf-8">
		<link href = "../css/style02.css" rel = "stylesheet">
	</head>
	<body>
	    <div class = "container">
		    
		    <form id = "frmLogin">
			    <h2 id = "title">Form Login</h2>
				<div class = "form-group">
				    <label for = "txUsername">Username:</label>
				    <input class = "form-control" type = "text" id = "txUsername" name = "txUsername">
				</div>
				<div class = "form-group">
				    <label for = "txPassword">Password:</label>
				    <input class = "form-control" type = "text" id = "txPassword" name = "txPassword">
				</div>
				<input class = "button" type = "submit" name = "rsLogin" id = "rsLogin" value = "Login">
				<input class = "button" type = "reset" name = "rsCancel" id = "rsCancel" value = "Cancel">
			</form>
		</div>
	</body>
</html>
